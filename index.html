<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pivot Table - Tableau Croisé Dynamique</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- Grist Plugin API -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  
  <!-- WebDataRocks -->
  <link rel="stylesheet" href="https://cdn.webdatarocks.com/latest/webdatarocks.min.css">
  <script src="https://cdn.webdatarocks.com/latest/webdatarocks.toolbar.min.js"></script>
  <script src="https://cdn.webdatarocks.com/latest/webdatarocks.js"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      min-height: 100vh;
    }
    .hidden { display: none !important; }

    .header {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    
    .lang-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.3); }
    .lang-btn.active { background: white; color: #0284c7; }

    .controls-bar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .control-group label {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
    }
    .control-group select {
      padding: 6px 12px;
      border: 2px solid #0ea5e9;
      border-radius: 8px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      min-width: 150px;
    }
    .control-group select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.2);
    }

    .main-content {
      padding: 0;
      height: calc(100vh - 100px);
    }

    #pivot-container {
      width: 100%;
      height: 100%;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: #64748b;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; color: #334155; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; max-width: 400px; margin: 0 auto; }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      padding: 4px 12px;
      font-size: 0.7em;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
    }
    footer a { color: #0ea5e9; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* WebDataRocks customization */
    #wdr-component { height: 100% !important; }
  </style>
</head>
<body>
  <header class="header">
    <h1>📊 <span data-i18n="title">Tableau Croisé Dynamique</span></h1>
    <div class="header-actions">
      <button class="lang-btn active" onclick="setLanguage('fr')">FR</button>
      <button class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>
  </header>

  <div class="controls-bar">
    <div class="control-group">
      <label>📋 Table :</label>
      <select id="table-select" onchange="onTableSelect(this.value)">
        <option value="">-- Choisir une table --</option>
      </select>
    </div>
  </div>

  <div class="main-content">
    <div id="loading-state" class="loading">
      <div class="loading-spinner"></div>
      <span>Chargement des données...</span>
    </div>
    
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-state-icon">📊</div>
      <h2>Aucune donnée</h2>
      <p>Sélectionnez une table source pour commencer à créer votre tableau croisé dynamique.</p>
    </div>
    
    <div id="pivot-container"></div>
  </div>

  <footer>
    <span>© 2026 Said Hamadou (isaytoo)</span>
    <a href="https://gristup.fr" target="_blank">gristup.fr</a>
  </footer>

  <script src="widget.js"></script>
</body>
</html>
